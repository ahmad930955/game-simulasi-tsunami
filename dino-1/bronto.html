<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bronto.css"/>
    <title>dino.web</title>
    
</head>
<body>

    <div id="mulai">
        <img src="mulai.png" class="mulai">
    </div>

    <div id="ombak1" class="ombak1"></div>
  
    <div class="background">
        <div class="backgroundmove"></div>
    </div>
    <div id="hidden" class="waktu"></div>
    <div class="sprite-box"></div>
    <div class="nyawa" id="nyawa">
        <div class="nyawa1" id="nyawa1"></div>
        <div class="nyawa2" id="nyawa2"></div>
        <div class="nyawa3" id="nyawa3"></div>
    </div>

    <!-- tombol exit -->
    <div id="btnexit">
    <img src="out.png" id="btnExit">
    </div>
    <audio id="hehehe" src="hehehe.mp3"></audio>
    <audio id="bgMusic" src="musik.mp3" loop></audio>

    <!-- popup -->
    <div id="menu" class="hidden">
      <img src="outmenu.png" class="outmenu" alt ="Menu Game">
      <img src="keluar.png"  class="menukeluar" alt ="Menu Game">
      <img src="lanjut.png"  class="menulanjut" alt ="Menu Game">
    </div>

     <div id="menangya" class="hidden">
      <div class="menang" alt ="Menu Game"></div>
      <div class="menangkeluar" alt ="Menu Game"></div>
      <div class="menanglagi" alt ="Menu Game"></div>
    </div>
    <div id="peta"  class="peta">
     <div id="zona"  class="zona"></div>
     </div>

     <div id="kalahya" class="hidden">
      <div class="kalah" alt ="Menu Game"></div>
      <div class="kalahkeluar" alt ="Menu Game"></div>
      <div class="kalahlagi" alt ="Menu Game"></div>
        <div class="besi" alt ="Menu Game"></div>
    </div>

    
     <div class="p1" id="p1"></div>
    <div class="p2" id="p2"></div>
    <div class="p3" id="p3"></div>
    <div class="p4" id="p4"></div>
    <div class="p5" id="p5"></div>

    <div id="timer">02:00</div>
    <div id="meja"></div>
    <script src="bronto.js"></script>
    
</body>
</html>
